name: Update Proxies

on:
  schedule:
    # Runs every 30 minutes
    - cron: "*/30 * * * *"
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: |
          pip install aiohttp

      - name: 🔄 Run proxy updater
        run: python scripts/update_proxies.py

      - name: 📊 Show results
        run: |
          echo "=== Proxy counts ==="
          python -c "
          import json
          with open('files/proxies.json') as f:
              d = json.load(f)
          print(f'Total proxies: {len(d[\"proxies\"])}')
          with open('files/timestamp.json') as f:
              t = json.load(f)
          print(f'Updated at: {t[\"updated\"]}')
          "

      - name: 💾 Commit and push updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add files/ README.md
          git diff --cached --quiet || git commit -m "🔄 Auto-update proxies - $(date +'%Y-%m-%d %H:%M UTC')"
          git push
