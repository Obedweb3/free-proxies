name: Update Proxies

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: pip install aiohttp

      - name: 🔄 Run proxy updater
        run: python scripts/update_proxies.py

      - name: 💾 Commit and push
        run: |
          git config user.name "Obedweb3"
          git config user.email "obedweb3@users.noreply.github.com"
          git add files/ README.md
          git diff --cached --quiet || git commit -m "🔄 Auto-update proxies - $(date +'%Y-%m-%d %H:%M UTC')"
          git push
